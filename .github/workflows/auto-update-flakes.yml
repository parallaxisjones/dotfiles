name: Auto Update Flakes

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake.lock and open PR
        id: update
        uses: DeterminateSystems/update-flake-lock@v28
        with:
          # Use a fine-grained PAT (Contents RW + Pull requests RW), NOT GITHUB_TOKEN:
          # PRs opened by GITHUB_TOKEN do not trigger the pull_request CI, so lint-eval
          # never runs and the automerge job (needs: [lint-eval]) never fires.
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-msg: 'chore: update flake.lock'
          pr-title: 'chore: update flake.lock'
          pr-labels: 'dependencies,automerge'
          branch: 'ci/flake-update'
          # Skip updating the secrets input since CI can't access the private repo
          inputs: 'nixpkgs agenix home-manager darwin nix-homebrew homebrew-bundle homebrew-core homebrew-cask disko fenix'


